  - title: Experience # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Lucky Enterprise, Inc.
        link: # boringcompany.com
        # link_text: boringcompany.com
        sub_title: Automation Engineer / Assistant Property Manager
        caption: July 2024 - August 2025
        description: | # this will include new lines to allow paragraphs
          - Designed and automated Unix shell and Python scripts to streamline operational processes, reducing manual workload and increasing reliability.
          - Built and maintained data collection pipelines (Python, pandas, APIs) ensuring accuracy and timely delivery of operational datasets.

      - layout: left
        title: Virtu Financial, Inc.
        link: https://www.virtu.com/
        link_text: virtu.com
        sub_title: Quality Assurance Engineer
        caption: March 2017 - January 2020
        description: | # this will include new lines to allow paragraphs
          - Monitored and validated mission-critical trading platform (POSIT ATS) across Linux environments, ensuring production reliability and performance under live market conditions.
          - Automated testing and monitoring workflows using Bash, Python, and SQL scripts, improving defect detection and reducing release cycle time.
          - Migrated QA application servers from Solaris to Linux, optimizing performance and standardizing environments.
          - Oversaw global QA team, coordinated with global engineers, trained junior staff, and documented procedures.

      - layout: left
        title: Investment Technology Group (ITG)
        link: https://en.wikipedia.org/wiki/Investment_Technology_Group
        link_text: Investment Technology Group
        sub_title: FIX Integration and ATS Support Analyst
        caption: June 2014 - March 2017
        description: | # this will include new lines to allow paragraphs
          - Configured and maintained FIX connectivity between client OMS platforms and Linux-based trading engines, ensuring secure and reliable client integrations.
          - Served as primary technical point of contact for client FIX integration issues, fielding inquiries and driving issues to resolution within SLA commitments.
          - Investigated system anomalies by correlating logs and metrics to resolve connectivity, routing, and trade execution issues in real time.
          - Executed releases of core trading components in Linux environments, managing change management tickets and installation scripts.
          - Automated trade reporting pipelines with Python, Bash, and SQL, leveraging cron jobs to ensure timely delivery.

      - layout: left
        title: Investment Technology Group (ITG)
        sub_title: Production Support Analyst
        caption: October 2010 - February 2014
        description: | # this will include new lines to allow paragraphs
          - Executed production releases of FIX routing engine and dark pool matching engine within Linux/Unix environments, coordinating deployments and validating rollout success.
          - Monitored critical End-of-Day batch jobs, analyzing logs and system performance metrics to detect anomalies and execute corrective actions.
          - Authored support run-books and conducted post-incident analysis to standardize incident response procedures and prevent recurrence.


