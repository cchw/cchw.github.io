  - title: Experience # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Lucky Enterprise, Inc.
        link: # boringcompany.com
        # link_text: boringcompany.com
        sub_title: Automation Engineer / Assistant Property Manager
        caption: July 2024 - August 2025
        description: | # this will include new lines to allow paragraphs
          - Designed and automated Unix shell and Python scripts to streamline operational processes, reducing manual workload and increasing reliability.
          - Built and maintained data collection pipelines (Python, pandas, APIs) ensuring accuracy and timely delivery of operational datasets.

      - layout: left
        title: Virtu Financial, Inc.
        link: https://www.virtu.com/
        link_text: virtu.com
        sub_title: Quality Assurance Engineer
        caption: March 2017 - January 2020
        description: | # this will include new lines to allow paragraphs
          - Led QA testing of mission-critical trading platform (POSIT ATS) across Linux environments, developing and executing test cases to validate functionality, performance, and reliability in development and production.
          - Automated testing and monitoring workflows using Bash, Python, and SQL scripts, improving defect detection and reducing release cycle time.
          - Migrated QA application servers from Solaris (UNIX) to Linux, optimizing performance and standardizing environments.
          - Oversaw global QA team, coordinated with global engineers, trained junior staff, and documented procedures.

      - layout: left
        title: Investment Technology Group (ITG)
        link: https://en.wikipedia.org/wiki/Investment_Technology_Group
        link_text: Investment Technology Group
        sub_title: FIX Integration and ATS Support Analyst
        caption: June 2014 - March 2017
        description: | # this will include new lines to allow paragraphs
          - Onboarded and configured new client and partner FIX connections between OMS platforms and Linux-based trading engines, ensuring secure and reliable integrations.
          - Troubleshot connectivity, routing, and message-transmission failures with external partners in real time through system-level testing and log analysis.
          - Automated end-of-day trade reporting and file delivery pipelines with shell scripting, Python, and SQL, scheduled via cron jobs to ensure timely transmission.
          - Executed releases of core trading components in Linux environments, managing change tickets and installation scripts.

      - layout: left
        title: Investment Technology Group (ITG)
        sub_title: Production Support Analyst
        caption: October 2010 - February 2014
        description: | # this will include new lines to allow paragraphs
          - Executed production releases of FIX routing engine and dark pool matching engine within Linux/UNIX environments, coordinating deployments with operations staff, writing install scripts, and validating roll-out success.
          - Monitored critical End-of-Day batch jobs, analyzing logs and system performance to detect and resolve failures against production support standards.
          - Authored support run-books and collaborated with infrastructure teams to document and standardize incident response procedures.


