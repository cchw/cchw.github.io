about_content: | # this will include new lines to allow paragraphs
  System and Application Support Engineer with 10+ years of experience in Linux/Unix production environments supporting financial trading platforms. Specialized in FIX protocol connectivity, trade execution support, and real-time incident response for fintech clients. Proven ability to monitor production systems, investigate anomalies using logs and metrics, coordinate deployments, and automate operational workflows using Python and Bash. Track record of supporting client integrations and adhering to SLA commitments in mission-critical financial services environments.

