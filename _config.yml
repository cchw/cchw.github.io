about_content: | # this will include new lines to allow paragraphs
  Application Support Engineer with 10+ years of experience supporting mission-critical financial systems in UNIX/Linux production environments. Strong background in production support and monitoring, end-of-day batch processing, secure partner connectivity onboarding, and real-time troubleshooting of transmission and routing failures. Skilled in UNIX shell scripting, Python, and SQL to automate file delivery pipelines, job scheduling (cron), and system monitoring. Proven ability to coordinate production releases with operations and vendor staff, author run-books, and support testers through development and production.

